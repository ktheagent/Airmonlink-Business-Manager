name: Validate and Build Windows Release

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  windows-release:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Show toolchain
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Format source
        run: dart format lib test

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Prepare Windows platform shell
        shell: pwsh
        run: ./tool/bootstrap_windows.ps1

      - name: Build Windows release
        run: flutter build windows --release

      - name: Create portable ZIP
        shell: pwsh
        run: ./tool/package_windows.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\airmonlink_business_manager.iss'

      - name: Upload release packages
        uses: actions/upload-artifact@v7
        with:
          name: Airmonlink-Business-Manager-1.0.0-build2-Windows
          path: dist/*
          if-no-files-found: error
          retention-days: 30
