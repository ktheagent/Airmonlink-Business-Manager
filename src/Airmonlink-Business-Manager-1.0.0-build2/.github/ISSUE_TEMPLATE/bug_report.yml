name: Bug report
description: Report a reproducible problem in Airmonlink Business Manager.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include real customer data, passwords, keys or production databases.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 1.0.0+2
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Startup/database
        - Point of sale
        - Products/inventory
        - Customers/suppliers
        - Expenses/reports
        - Backup/export
        - Windows build/installer
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: Describe the exact steps, expected result and actual result.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      render: shell
