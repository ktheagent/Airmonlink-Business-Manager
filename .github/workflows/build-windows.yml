name: Build Windows
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: src/Airmonlink-Business-Manager-1.0.0-build2
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true
      - name: Dependencies
        run: flutter pub get
      - name: Analyze
        continue-on-error: true
        run: flutter analyze
      - name: Tests
        continue-on-error: true
        run: flutter test --reporter expanded
      - name: Prepare Windows
        run: ./tool/bootstrap_windows.ps1
      - name: Build Windows
        run: flutter build windows --release
      - name: Package portable
        run: ./tool/package_windows.ps1
      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: Airmonlink-Windows-Portable
          path: src/Airmonlink-Business-Manager-1.0.0-build2/dist/*Portable.zip
          if-no-files-found: error
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\airmonlink_business_manager.iss'
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Airmonlink-Windows-Installer
          path: src/Airmonlink-Business-Manager-1.0.0-build2/dist/*Setup.exe
          if-no-files-found: error
